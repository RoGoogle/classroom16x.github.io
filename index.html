        #visor-juego {

            border-radius: 0.5em;

    <!-- Script de control de la app unificada -->
    <script>
        function abrirJuego(urlJuego) {
            if(urlJuego.includes('PON LA URL AQUÍ')) {
                alert('Falta introducir la URL de inserción de este juego en el código HTML.');
                return;
            }
            document.getElementById('contenedor-menu').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'block';
            document.getElementById('visor-juego').src = urlJuego;
        }

        function cerrarJuego() {
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('contenedor-menu').style.display = 'block';
            document.getElementById('visor-juego').src = '';
        }

        /* 🆕 Nueva Función JavaScript para activar el Fullscreen en el Iframe */
        function toggleFullscreen() {
            var juegoIframe = document.getElementById('visor-juego');
            if (juegoIframe.requestFullscreen) {
                juegoIframe.requestFullscreen();
            } else if (juegoIframe.webkitRequestFullscreen) { /* Compatibilidad con Safari/Chrome antiguo */
                juegoIframe.webkitRequestFullscreen();
            } else if (juegoIframe.msRequestFullscreen) { /* Compatibilidad con IE11 */
                juegoIframe.msRequestFullscreen();
            }
        }
          // 🔍 Función corregida para filtrar los juegos
function filtrarJuegos() {
    var input = document.getElementById('buscador');
    var filtro = input.value.toLowerCase();
    var contenedor = document.querySelector('.card-masonry');
    var tarjetas = contenedor.getElementsByClassName('card');

    for (var i = 0; i < tarjetas.length; i++) {
        var nombreJuego = tarjetas[i].querySelector('.card-body span');
        if (nombreJuego) {
            var texto = nombreJuego.textContent || nombreJuego.innerText;
            if (texto.toLowerCase().indexOf(filtro) > -1) {
                tarjetas[i].style.setProperty('display', '', 'important'); // Muestra el juego
            } else {
                tarjetas[i].style.setProperty('display', 'none', 'important'); // Oculta el juego
            }
        }
    }
}
    </script>
    <!-- SCRIPT DEL TITULO -->
         <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Obtiene las primeras dos letras del idioma (ej. "es", "en", "fr")
            const userLang = navigator.language || navigator.userLanguage;
            const langCode = userLang.slice(0, 2);

            // Define los títulos para cada idioma
            const titles = {
                es: "Inicio - Classroom",
                en: "Home - Classroom",
                fr: "Accueli - Classroom"
            };

            // Asigna el título o usa uno por defecto (en) si el idioma no está en la lista
            document.title = titles[langCode] || titles['en'];
        });
    </script>
